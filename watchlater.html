<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Later — Home Theatre</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stars"></div>

  <nav class="navbar">
    <a class="navbar-logo" href="home.html">🎬 HOME<span>THEATRE</span></a>
    <div class="nav-links">
      <a class="nav-btn" href="home.html">My Movies</a>
      <a class="nav-btn active" href="watchlater.html">Watch Later</a>
      <a class="nav-btn" href="recommended.html">Recommended</a>
      <a class="nav-btn" href="movies2026.html">2026 Movies</a>
      <a class="nav-btn" href="feedback.html">Feedback</a>
      <button class="nav-btn logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-header">
      <h1>Watch <span>Later</span></h1>
      <p>Movies you've saved to watch when you're ready.</p>
    </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="🔍 Search watch later..." oninput="renderGallery()">
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireLogin('../index.html');
    initStars('stars');
    injectSidebarHTML();

    function renderGallery() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const watchLater = Store.get('watchLater') || [];
      const filtered = watchLater.filter(m => m.title.toLowerCase().includes(query));
      const gallery = document.getElementById('gallery');

      if (filtered.length === 0) {
        gallery.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="icon">🕑</div>
            <h3>Nothing Saved Yet</h3>
            <p>Add movies from <a href="recommended.html" style="color:var(--accent)">Recommended</a> or <a href="movies2026.html" style="color:var(--accent)">2026 Movies</a>.</p>
          </div>`;
        return;
      }

      gallery.innerHTML = filtered.map((m, i) => `
        <div class="movie-card" onclick='openSidebar(${i})'>
          <img src="${m.img}" alt="${m.title}" loading="lazy">
          <div class="card-title">${m.title}</div>
        </div>`).join('');
    }

    function openSidebar(i) {
      const watchLater = Store.get('watchLater') || [];
      buildSidebar(watchLater[i], 'watchLater');
    }

    renderGallery();
  </script>
</body>
</html>
