<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HomeTheatre</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at bottom, #0a1a2f, #000814);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

/* CONTAINER */
.login-container {
    width: 350px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* LOGO */
.logo {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 30px;
    text-align: center;
}

.logo span {
    color: orange;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    font-size: 14px;
    color: #ccc;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    outline: none;
    background: #1a1a2e;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: orange;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff9900;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
    color: #aaa;
}

.footer a {
    color: orange;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="login-container">

    <div class="logo">HOME<span>THEATRE</span></div>

    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="#">Sign up</a>
    </div>

</div>

</body>
</html>
